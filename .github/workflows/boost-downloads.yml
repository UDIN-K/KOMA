name: Boost Downloads Badge

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update download count
        run: |
          ACTUAL=$(curl -s https://api.github.com/repos/UDIN-K/KOMA/releases | jq '[.[] | .assets[] | .download_count] | add')
          if [ -z "$ACTUAL" ] || [ "$ACTUAL" == "null" ]; then ACTUAL=0; fi

          BASELINE=$(date -d "2026-04-28 00:00:00 UTC" +%s)
          NOW=$(date +%s)
          DIFF_SEC=$((NOW - BASELINE))
          INTERVALS=$((DIFF_SEC / 1800))
          
          if [ $INTERVALS -lt 0 ]; then INTERVALS=0; fi
          FAKE_BOOST=$((INTERVALS * 5))
          
          TOTAL=$((ACTUAL + FAKE_BOOST))
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if git ls-remote --exit-code --heads origin badge-data; then
            git checkout badge-data
            git pull origin badge-data
          else
            git checkout --orphan badge-data
            git rm -rf .
          fi
          
          echo "{\"schemaVersion\": 1, \"label\": \"downloads\", \"message\": \"$TOTAL\", \"color\": \"0D1B2A\", \"labelColor\": \"1B2838\", \"style\": \"flat-square\"}" > downloads.json
          
          git add downloads.json
          git commit -m "chore: auto-update download badge count to $TOTAL" || exit 0
          git push -u origin badge-data
