name: Sync Releases to Website

on:
  release:
    types: [published, edited]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website sync
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_SYNC_TOKEN }}" \
            https://api.github.com/repos/UDIN-K/UDIN-K.github.io/actions/workflows/sync-extensions.yml/dispatches \
            -d '{"ref":"main"}'
          echo "✅ Triggered website sync workflow"
